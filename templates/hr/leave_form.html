{% extends 'base.html' %}
{% block title %}Đăng ký Nghỉ Phép{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card card-box mt-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-pencil-square"></i> Form Đăng Ký Nghỉ Phép</h5>
            </div>
            <div class="card-body">
                <div class="alert alert-info small">
                    <i class="bi bi-info-circle"></i> Vui lòng nộp đơn xin nghỉ phép <b>trước ít nhất 2 ngày</b> so với ngày bắt đầu nghỉ.
                </div>
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Hình thức nghỉ:</label>
                        <select name="leave_type" id="leave_type" class="form-select" onchange="toggleEndDate()">
                            <option value="FULL">Nghỉ cả ngày (hoặc nhiều ngày)</option>
                            <option value="MORNING">Nghỉ Nửa ngày (Buổi Sáng)</option>
                            <option value="AFTERNOON">Nghỉ Nửa ngày (Buổi Chiều)</option>
                        </select>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Xin nghỉ từ ngày:</label>
                            <input type="date" name="start_date" id="start_date" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3" id="end_date_container">
                            <label class="form-label fw-bold">Đến hết ngày:</label>
                            <input type="date" name="end_date" id="end_date" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Lý do xin nghỉ:</label>
                        <textarea name="reason" rows="4" class="form-control" required placeholder="Vui lòng ghi rõ lý do xin nghỉ..."></textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'leave_list' %}" class="btn btn-secondary">Quay lại</a>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> Gửi Đơn Xin Nghỉ</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Ẩn/Hiện ô chọn ngày kết thúc dựa trên loại nghỉ
    function toggleEndDate() {
        var leaveType = document.getElementById('leave_type').value;
        var endDateContainer = document.getElementById('end_date_container');
        var endDateInput = document.getElementById('end_date');
        
        if (leaveType === 'MORNING' || leaveType === 'AFTERNOON') {
            endDateContainer.style.display = 'none';
            endDateInput.removeAttribute('required'); // Không bắt buộc nhập nếu ẩn
        } else {
            endDateContainer.style.display = 'block';
            endDateInput.setAttribute('required', 'required');
        }
    }
    // Chạy thử ngay khi load trang
    window.onload = toggleEndDate;
</script>
{% endblock %}
